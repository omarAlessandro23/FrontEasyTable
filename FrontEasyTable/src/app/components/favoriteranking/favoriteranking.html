<div class="ranking-container">
  <h2>🏆 Ranking de Restaurantes Más Favoritos</h2>
  <p class="subtitle">Visualización de los restaurantes con mayor cantidad de interacciones "Favorito" por parte de los usuarios.</p>

  <div *ngIf="isLoading" class="loading-state">
    <p>Cargando gráfico de posiciones...</p>
  </div>

  <div *ngIf="errorMessage" class="error-state">
    {{ errorMessage }}
  </div>

  <div *ngIf="!isLoading && !errorMessage" class="content-layout">
    
    <div class="chart-wrapper">
      <canvas baseChart
              [data]="barChartData"
              [options]="barChartOptions"
              [type]="barChartType">
      </canvas>
    </div>

    <div class="table-wrapper">
      <table class="ranking-table">
        <thead>
          <tr>
            <th style="width: 80px;">Puesto</th>
            <th>Restaurante</th>
            <th>Favoritos</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of barChartData.labels; let i = index">
            <td class="position-cell">
              <span class="podium-badge" [ngClass]="'top-' + (i + 1)">
                {{ i + 1 }}
              </span>
            </td>
            <td class="restaurant-name">{{ item }}</td>
            <td class="count-cell">{{ barChartData.datasets[0].data[i] }} ⭐</td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
