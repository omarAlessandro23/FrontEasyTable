<div class="container" style="padding: 20px;">
  <h2>Registrar Nuevo Restaurante</h2>
  
  <form [formGroup]="form" (ngSubmit)="aceptar()">
    
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Nombre del Restaurante</mat-label>
      <input matInput formControlName="nombre">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Dirección</mat-label>
      <input matInput formControlName="direccion">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Calificación Inicial (0 - 5)</mat-label>
      <input matInput type="number" formControlName="calificacion">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>URL de la Web</mat-label>
      <input matInput formControlName="web">
    </mat-form-field>

    <mat-form-field appearance="outline" class="w-100">
      <mat-label>URL de Google Maps</mat-label>
      <input matInput formControlName="maps">
    </mat-form-field>

    <div style="display: flex; gap: 15px;">
      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Latitud</mat-label>
        <input matInput type="number" formControlName="latitud">
      </mat-form-field>

      <mat-form-field appearance="outline" style="flex: 1;">
        <mat-label>Longitud</mat-label>
        <input matInput type="number" formControlName="longitud">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="w-100">
  <mat-label>Categoría</mat-label>
  <mat-select formControlName="categoria">
    <mat-option *ngFor="let cat of listaCategorias" [value]="cat.idCategory">
      {{ cat.nombreCategoria }}
    </mat-option>
  </mat-select>
</mat-form-field>

    <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">
      <mat-icon>save</mat-icon> Registrar
    </button>

  </form>
</div>
