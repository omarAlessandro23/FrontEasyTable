<div class="container">
  <h2>Registrar Horario</h2>

  <form [formGroup]="form" (ngSubmit)="aceptar()">
    
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Día de la semana (1-7)</mat-label>
      <input matInput type="number" formControlName="dayOfWeek" min="1" max="7" placeholder="Ej. 1 para Lunes">
      <mat-error *ngIf="form.get('dayOfWeek')?.hasError('required')">
        El día de la semana es <strong>obligatorio</strong>.
      </mat-error>
      <mat-error *ngIf="form.get('dayOfWeek')?.hasError('min') || form.get('dayOfWeek')?.hasError('max')">
        Debe ser un número entre <strong>1 y 7</strong>.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Hora de Apertura</mat-label>
      <input matInput type="time" formControlName="openTime">
      <mat-error *ngIf="form.get('openTime')?.hasError('required')">
        La hora de apertura es <strong>obligatoria</strong>.
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Hora de Cierre</mat-label>
      <input matInput type="time" formControlName="closeTime">
      <mat-error *ngIf="form.get('closeTime')?.hasError('required')">
        La hora de cierre es <strong>obligatoria</strong>.
      </mat-error>
    </mat-form-field>

    <div class="botones-container">
      <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid">Aceptar</button>
      <button mat-raised-button color="warn" type="button" (click)="cancelar()">Cancelar</button>
    </div>

  </form>
</div>
