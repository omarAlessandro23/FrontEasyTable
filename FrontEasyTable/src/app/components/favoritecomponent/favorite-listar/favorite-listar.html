<div class="container" style="padding: 20px;">
  <h2>Lista de Favoritos</h2>

  <div style="margin-bottom: 16px;">
    <a mat-raised-button color="primary" routerLink="/favoritos/news">
      <mat-icon>favorite_border</mat-icon> Añadir Favorito
    </a>
  </div>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="favoriteid">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.favoriteid}} </td>
    </ng-container>

    <ng-container matColumnDef="usuarioid">
      <th mat-header-cell *matHeaderCellDef> ID Usuario </th>
      <td mat-cell *matCellDef="let element"> {{element.usuarioid}} </td>
    </ng-container>

    <ng-container matColumnDef="restaurantid">
      <th mat-header-cell *matHeaderCellDef> ID Restaurante </th>
      <td mat-cell *matCellDef="let element"> {{element.restaurantid}} </td>
    </ng-container>

    <ng-container matColumnDef="comentario">
      <th mat-header-cell *matHeaderCellDef> Comentario </th>
      <td mat-cell *matCellDef="let element"> {{element.comentario || '—'}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 100px;"> Acciones </th>
      <td mat-cell *matCellDef="let element" style="text-align: center;">
        @if (isAdmin) {
          <button mat-icon-button color="warn" (click)="eliminar(element.favoriteid)" title="Eliminar Favorito">
            <mat-icon>delete</mat-icon>
          </button>
        }
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    <tr class="mat-row" *matNoDataRow>
      <td class="mat-cell" [attr.colspan]="displayedColumns.length" style="text-align: center; padding: 24px;">
        <mat-icon color="warn">favorite_border</mat-icon>
        <p>No hay favoritos registrados aún.</p>
      </td>
    </tr>
  </table>
</div>
