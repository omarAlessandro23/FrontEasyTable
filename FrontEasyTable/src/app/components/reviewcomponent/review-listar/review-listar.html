<div class="container" style="padding: 20px;">
  <h2>Lista de Reseñas</h2>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8" style="width: 100%;">

    <ng-container matColumnDef="reviewId">
      <th mat-header-cell *matHeaderCellDef> ID </th>
      <td mat-cell *matCellDef="let element"> {{element.reviewId}} </td>
    </ng-container>

    <ng-container matColumnDef="userId">
      <th mat-header-cell *matHeaderCellDef> ID Usuario </th>
      <td mat-cell *matCellDef="let element"> {{element.userId}} </td>
    </ng-container>

    <ng-container matColumnDef="restaurantId">
      <th mat-header-cell *matHeaderCellDef> ID Restaurante </th>
      <td mat-cell *matCellDef="let element"> {{element.restaurantId}} </td>
    </ng-container>

    <ng-container matColumnDef="rating">
      <th mat-header-cell *matHeaderCellDef> Calificación </th>
      <td mat-cell *matCellDef="let element"> {{element.rating}} ⭐ </td>
    </ng-container>

    <ng-container matColumnDef="comment">
      <th mat-header-cell *matHeaderCellDef> Comentario </th>
      <td mat-cell *matCellDef="let element"> {{element.comment}} </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef> Fecha </th>
      <td mat-cell *matCellDef="let element"> {{element.createdAt | date:'short'}} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef style="text-align: center; width: 120px;"> Acciones </th>
      <td mat-cell *matCellDef="let element" style="text-align: center;">
        <a mat-icon-button [routerLink]="['/reviews/edit', element.reviewId]" color="primary" title="Editar Reseña">
          <mat-icon>edit</mat-icon>
        </a>
        <button mat-icon-button color="warn" (click)="eliminar(element.reviewId)" title="Eliminar Reseña">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
</div>
