<div class="report-container">
    <h2>Reporte: Mejores Calificados</h2>

    <div class="filter-box" style="margin-bottom: 20px; display: flex; gap: 10px; align-items: center;">
        <input type="number" [(ngModel)]="ratingInput" placeholder="Rating (0-5)" min="0" max="5" step="0.1"
            style="padding: 8px; border: 1px solid #ccc; border-radius: 4px;">

        <button (click)="cargarReporte()" class="btn-rojo">
            Filtrar Resultados
        </button>
    </div>

    @if (hasData) {
    <div style="display: block; width: 100%; height: 400px; background: white; padding: 15px; border-radius: 8px;">
        <canvas baseChart [datasets]="barChartData" [labels]="barChartLabels" [options]="barChartOptions"
            [legend]="barChartLegend" [type]="barChartType">
        </canvas>
    </div>
    } @else {
    <div class="no-data" style="text-align: center; padding: 40px; border: 2px dashed #ccc;">
        <p>Ingresa una calificación mínima y presiona "Filtrar" para ver los restaurantes.</p>
    </div>
    }
</div>
